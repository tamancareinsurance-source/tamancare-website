
<style>
  #chat-wrap { max-width: 480px; margin: 0 auto; font-family: 'Outfit', sans-serif; }
  #chat-header {
    background: #0a0a0a; border-radius: 12px 12px 0 0;
    padding: 16px 20px; display: flex; align-items: center; gap: 12px;
    border: 1px solid #c9a84c44; border-bottom: none;
  }
  #chat-header .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: #c9a84c22; border: 1.5px solid #c9a84c;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  #chat-header .info { flex: 1; }
  #chat-header .name { font-weight: 600; font-size: 14px; color: #c9a84c; }
  #chat-header .status { font-size: 12px; color: #888; display: flex; align-items: center; gap: 5px; }
  #chat-header .dot { width: 7px; height: 7px; border-radius: 50%; background: #25D366; }
  #chat-header .badge { font-size: 11px; background: #c9a84c22; color: #c9a84c; border: 1px solid #c9a84c44; padding: 3px 10px; border-radius: 20px; }
  #messages {
    background: #111; border-left: 1px solid #c9a84c44; border-right: 1px solid #c9a84c44;
    padding: 16px; min-height: 340px; max-height: 380px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 10px;
  }
  .msg { display: flex; align-items: flex-end; gap: 8px; animation: fadeUp 0.25s ease; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: none; } }
  .msg.bot { flex-direction: row; }
  .msg.user { flex-direction: row-reverse; }
  .msg .bubble {
    max-width: 78%; padding: 10px 14px; border-radius: 14px; font-size: 13.5px; line-height: 1.55;
  }
  .msg.bot .bubble { background: #1a1a1a; color: #f0ece4; border-radius: 4px 14px 14px 14px; border: 1px solid #c9a84c22; }
  .msg.user .bubble { background: #c9a84c; color: #0a0a0a; border-radius: 14px 4px 14px 14px; font-weight: 500; }
  .msg .bot-icon { width: 26px; height: 26px; border-radius: 50%; background: #c9a84c22; border: 1px solid #c9a84c66; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
  .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 4px; padding: 0 0 4px 34px; }
  .chip {
    background: #1a1a1a; border: 1px solid #c9a84c55; color: #c9a84c;
    font-size: 12px; padding: 6px 13px; border-radius: 20px; cursor: pointer;
    transition: all 0.2s; font-weight: 500;
  }
  .chip:hover { background: #c9a84c; color: #0a0a0a; }
  #input-row {
    background: #0a0a0a; border: 1px solid #c9a84c44; border-top: 1px solid #c9a84c22;
    border-radius: 0 0 12px 12px;
    display: flex; align-items: center; gap: 8px; padding: 10px 14px;
  }
  #user-input {
    flex: 1; background: #1a1a1a; border: 1px solid #c9a84c33; border-radius: 20px;
    padding: 9px 16px; color: #f0ece4; font-size: 13.5px; outline: none;
    font-family: inherit;
  }
  #user-input::placeholder { color: #555; }
  #user-input:focus { border-color: #c9a84c88; }
  #send-btn {
    width: 36px; height: 36px; border-radius: 50%; background: #c9a84c; border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.2s;
  }
  #send-btn:hover { background: #e8c96e; }
  #send-btn svg { width: 16px; height: 16px; fill: #0a0a0a; }
  .cta-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; padding-left: 34px; }
  .cta-call, .cta-wa {
    font-size: 12px; font-weight: 600; padding: 7px 14px; border-radius: 6px;
    text-decoration: none; display: flex; align-items: center; gap: 5px; cursor: pointer; border: none;
  }
  .cta-call { background: #c9a84c22; color: #c9a84c; border: 1px solid #c9a84c55; }
  .cta-wa { background: #25D36622; color: #25D366; border: 1px solid #25D36655; }
  .typing { display: flex; align-items: center; gap: 4px; padding: 8px 12px; background: #1a1a1a; border: 1px solid #c9a84c22; border-radius: 14px; width: fit-content; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: #c9a84c; animation: blink 1s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
</style>

<div id="chat-wrap">
  <div id="chat-header">
    <div class="avatar">🛡️</div>
    <div class="info">
      <div class="name">Taman Care Advisor</div>
      <div class="status"><span class="dot"></span> Online now</div>
    </div>
    <div class="badge">AI Powered</div>
  </div>
  <div id="messages"></div>
  <div id="input-row">
    <input id="user-input" type="text" placeholder="Type your message..." />
    <button id="send-btn" onclick="sendMsg()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const msgs = document.getElementById('messages');
const inp = document.getElementById('user-input');

let state = { step: 'greeting', type: null, data: {} };

const SYSTEM = `You are an expert Insurance Advisor chatbot for "Taman Care Insurance Services" based in Chandigarh, India.
Your goal is to help users: understand insurance (Health, Car, Bike, Life, Commercial), recommend the best policy, collect lead info (Name, Phone), and push towards action (Call/WhatsApp/Get Quote).
Tone: Professional but friendly, simple English, helpful, NOT robotic.
RULES:
- Ask questions step by step (not all at once)
- Keep responses SHORT (max 3-4 lines)
- Always guide toward a decision
- If user is confused → simplify
- If user is ready → collect name and phone

STEP FLOW:
Step 1: Greet & ask insurance type (Health / Car / Bike / Life / Not sure)
Step 2: Ask 2-3 qualification questions based on type
Step 3: Give 2-3 simple plan recommendations (mention HDFC, ICICI, Star Health etc.)
Step 4: Ask for name and phone to share best quote
Step 5: Thank them and say advisor will call within 30 mins. Show CTA: Call 9068541300 or WhatsApp.

OBJECTIONS:
- "just checking" → "No worries 😊 Let me show you best options in 30 seconds."
- "too expensive" → "I can suggest budget-friendly plans starting from ₹X/month."
- confused → "Just tell me your age and I'll suggest the best plan 👍"

Always highlight: ✔ Fast claims ✔ Best price ✔ Trusted service ✔ 500+ happy clients

If asked unrelated questions → politely bring back to insurance.

END GOAL: Get name + phone, or push to call/WhatsApp.
Phone: 9068541300 | WhatsApp: wa.me/919068541300

FORMATTING: Use plain text only. No markdown. Use line breaks for readability. Keep it conversational.
After collecting lead info, include exactly this line at the end: [SHOW_CTA]`;

let history = [];

async function callClaude(userMsg) {
  history.push({ role: 'user', content: userMsg });
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: SYSTEM,
      messages: history
    })
  });
  const data = await response.json();
  const reply = data.content?.[0]?.text || "Sorry, I couldn't connect. Please call us at 9068541300.";
  history.push({ role: 'assistant', content: reply });
  return reply;
}

function addBot(text, chips = [], showCta = false) {
  const hasCta = text.includes('[SHOW_CTA]');
  const cleanText = text.replace('[SHOW_CTA]', '').trim();

  const wrap = document.createElement('div');
  wrap.style.display = 'flex'; wrap.style.flexDirection = 'column';

  const row = document.createElement('div');
  row.className = 'msg bot';
  row.innerHTML = `<div class="bot-icon">🛡️</div><div class="bubble">${cleanText.replace(/\n/g,'<br>')}</div>`;
  wrap.appendChild(row);

  if (chips.length) {
    const chipRow = document.createElement('div');
    chipRow.className = 'chips';
    chips.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'chip'; btn.textContent = c;
      btn.onclick = () => { chipRow.remove(); sendMsg(c); };
      chipRow.appendChild(btn);
    });
    wrap.appendChild(chipRow);
  }

  if (hasCta || showCta) {
    const ctaRow = document.createElement('div');
    ctaRow.className = 'cta-row';
    ctaRow.innerHTML = `
      <a class="cta-call" href="tel:9068541300">📞 Call Now: 9068541300</a>
      <a class="cta-wa" href="https://wa.me/919068541300" target="_blank">💬 WhatsApp Us</a>`;
    wrap.appendChild(ctaRow);
  }

  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function addUser(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="bubble">${text}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const t = document.createElement('div');
  t.className = 'msg bot'; t.id = 'typing-ind';
  t.innerHTML = `<div class="bot-icon">🛡️</div><div class="typing"><span></span><span></span><span></span></div>`;
  msgs.appendChild(t); msgs.scrollTop = msgs.scrollHeight;
  return t;
}

async function sendMsg(override) {
  const text = override || inp.value.trim();
  if (!text) return;
  inp.value = '';
  addUser(text);
  const t = showTyping();
  try {
    const reply = await callClaude(text);
    t.remove();
    if (state.step === 'greeting') {
      state.step = 'qualify';
      addBot(reply, ['Health Insurance', 'Car Insurance', 'Bike Insurance', 'Life Insurance', 'Not sure']);
    } else if (history.length <= 4) {
      addBot(reply, ['Yes', 'No', 'Tell me more']);
    } else {
      addBot(reply);
    }
  } catch(e) {
    t.remove();
    addBot('Sorry, connection issue. Please call us at 9068541300 or WhatsApp!', [], true);
  }
}

inp.addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });

(async () => {
  const t = showTyping();
  await new Promise(r => setTimeout(r, 900));
  t.remove();
  addBot(
    "Hi! 👋 Welcome to Taman Care Insurance Services.\n\nI'm your personal insurance advisor. What type of insurance are you looking for today?",
    ['Health Insurance', 'Car Insurance', 'Bike Insurance', 'Life Insurance', 'Not sure']
  );
})();
</script>
